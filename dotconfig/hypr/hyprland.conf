# MAIN HYPRLAND CONFIG - PROJECT Ricing (FIXED)
# -----------------------------------------------------

# Variabel folder proyek
$project_dir = $HOME/.config/hypr

# -----------------------------------------------------
# Monitor (Fallback)
# -----------------------------------------------------
monitor=,preferred,auto,1
source = $project_dir/conf/monitor.conf

# -----------------------------------------------------
# Essential Settings (Project-Based)
# -----------------------------------------------------
source = $project_dir/conf/cursor.conf
source = $project_dir/conf/environment.conf
source = $project_dir/conf/keyboard.conf
source = $project_dir/colors.conf

# -----------------------------------------------------
# Load UI & Layout (Project-Based)
# -----------------------------------------------------
source = $project_dir/conf/window.conf
source = $project_dir/conf/decoration.conf
source = $project_dir/conf/layout.conf
source = $project_dir/conf/workspace.conf
source = $project_dir/conf/misc.conf
source = $project_dir/conf/keybinding.conf
source = $project_dir/conf/windowrule.conf
source = $project_dir/conf/animation.conf
source = $project_dir/conf/plugins.conf

# -----------------------------------------------------
# Environment for xdg-desktop-portal-hyprland
# -----------------------------------------------------
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# -----------------------------------------------------
# Overrides & Fixes
# -----------------------------------------------------

# Efek Blur untuk Waybar
layerrule2 = blur, waybar
layerrule2 = ignorealpha 0.3, waybar

# Plugin Manager
exec-once = hyprpm reload

# -----------------------------------------------------
# Autostart (Correct Waybar Command)
# -----------------------------------------------------
# Jalankan waybar dari project ini
exec-once = $project_dir/scripts/launch-waybar.sh
exec-once = swayosd-server
source = $project_dir/conf/autostart.conf


# Transparansi untuk Kitty
windowrule {
    name = kitty
    match:class = ^(kitty)$
    opacity = 0.6 0.6
}

# Ricing Project Config
source = $project_dir/conf/ricing.conf
source = $project_dir/conf/custom.conf

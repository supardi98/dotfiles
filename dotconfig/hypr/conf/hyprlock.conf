# Cache Folder
$project_cache_folder = $HOME/.cache/hyprland-dotfiles

# Source colors (from your project)
$project_dir = $HOME/Projects/ricing/dotconfig/hypr
source = $project_dir/colors.conf

general {
    ignore_empty_input = true
    grace = 0
    disable_loading = false
}

background {
    monitor =
    path = $project_cache_folder/blurred_wallpaper.png
    blur_passes = 1 # Subtle extra blur for depth
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# TIME
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = $primary
    font_size = 140
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 180
    halign = center
    valign = center
    shadow_passes = 4
    shadow_size = 12
    shadow_color = rgba(0,0,0,0.5)
}

# DATE
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B %Y")"
    color = $on_surface_variant
    font_size = 22
    font_family = JetBrainsMono Nerd Font Semibold
    position = 0, 70
    halign = center
    valign = center
}

# USER AVATAR (Square/Circle with Primary Border)
image {
    monitor = 
    path = $project_cache_folder/square_wallpaper.png
    size = 120
    rounding = -1 # Circle
    border_size = 3
    border_color = $primary
    rotate = 0
    reload_time = -1
    position = 0, -60
    halign = center
    valign = center
    shadow_passes = 2
}

# INPUT FIELD (Cyber-Glassy)
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.15
    dots_center = true
    outer_color = $primary
    inner_color = rgba(0, 0, 0, 0.4)
    font_color = $on_primary_container
    fade_on_empty = false
    placeholder_text = <i>Enter Password...</i>
    hide_input = false
    rounding = 15
    check_color = $primary
    fail_color = $error
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    position = 0, -220
    halign = center
    valign = center
    
    # Glass effect shadows
    shadow_passes = 2
    shadow_size = 5
    shadow_color = rgba(0, 0, 0, 0.3)
}

# USERNAME / GREETING
label {
    monitor =
    text = Hey, $USER
    color = $on_surface
    font_size = 18
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, -150
    halign = center
    valign = center
}

# BATTERY / SYSTEM INFO (Optional aesthetic touch)
label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +'%p')</b>"
    color = $primary
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, 30
    halign = center
    valign = bottom
}

# Cache Folder
$project_cache_folder = $HOME/.cache/hyprland-dotfiles

# Source colors (from your project)
source = $project_dir/colors.conf

general {
    ignore_empty_input = true
    grace = 0
    disable_loading = false
}

background {
    monitor =
    path = $project_cache_folder/blurred_wallpaper.png   # Generated by your script
    blur_passes = 0 # 0 for none, your script already blurs it
    color = rgba(30, 30, 46, 1.0)
}

# TIME
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255, 255, 255, 0.9)
    font_size = 120
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 150
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 10
}

# DATE
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"
    color = rgba(255, 255, 255, 0.8)
    font_size = 24
    font_family = JetBrainsMono Nerd Font Semibold
    position = 0, 50
    halign = center
    valign = center
}

# USER AVATAR
image {
    monitor = 
    path = $project_cache_folder/square_wallpaper.png
    size = 120
    rounding = -1 # Circle
    border_size = 2
    border_color = rgba(255, 255, 255, 0.4)
    rotate = 0
    reload_time = -1
    position = 0, -60
    halign = center
    valign = center
    shadow_passes = 2
}

# INPUT FIELD (Glassy macOS Style)
input-field {
    monitor =
    size = 280, 50
    outline_thickness = 1
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.1)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgba(255, 255, 255, 0.8)
    fade_on_empty = false
    placeholder_text = <i>Password...</i>
    hide_input = false
    rounding = 12
    check_color = rgba(255, 255, 255, 0.4)
    fail_color = rgba(255, 95, 86, 0.8)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    position = 0, -200
    halign = center
    valign = center
    
    # Glass effect shadows
    shadow_passes = 2
    shadow_size = 5
    shadow_color = rgba(0, 0, 0, 0.2)
}

# USERNAME
label {
    monitor =
    text = $USER
    color = rgba(255, 255, 255, 0.6)
    font_size = 14
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, -150
    halign = center
    valign = center
}

# Start Listeners

# Start Polkit
exec-once=/usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Load Wallpaper
exec-once = $project_dir/scripts/wallpaper-restore.sh

# Load Notification Daemon
exec-once = swaync

# Load GTK settings
exec-once = $project_dir/scripts/gtk.sh

# Using hypridle to start hyprlock
exec-once = hypridle -c ~/.config/hypr/conf/hypridle.conf

# Load cliphist history
exec-once = wl-paste --watch cliphist store

# Autostart ML4W App
exec-once = spotify-tray-wayland

# Start autostart cleanup
exec-once = $project_dir/scripts/cleanup.sh

# Load configuration from ML4W Hyprland Settings App
exec = $project_dir/scripts/hyprctl.sh

# Start Listeners
exec-once=$project_dir/scripts/listeners.sh --startall

# Start GNOME Keyring
exec-once = gnome-keyring-daemon --start --components=secrets

# Start Polkit
exec-once=/usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Load Wallpaper
exec-once = awww-daemon

# Load Notification Daemon
exec-once = swaync

# Load GTK settings
exec-once = $project_dir/scripts/gtk.sh

# Using hypridle to start hyprlock
exec-once = hypridle -c ~/.config/hypr/conf/hypridle.conf

# Load cliphist history
exec-once = wl-paste --watch cliphist store

# Start autostart cleanup
exec-once = $project_dir/scripts/cleanup.sh

# Autostart Ricing App
exec-once = spotify-tray-wayland
